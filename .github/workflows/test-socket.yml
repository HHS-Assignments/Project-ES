name: Testing Socket Binaries

# Triggered automatically after the "Compile Socket Binaries" workflow
# finishes successfully, or manually from the Actions tab.
on:
  workflow_run:
    workflows: ["Compile Socket Binaries"]
    types:
      - completed
  workflow_dispatch:
permissions:
  # Needed to download artifacts from the triggering workflow run.
  actions: read
  contents: read
jobs:
  test:
    # Only run when the upstream compile workflow succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repo (we need the test script + sources)
      # ------------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Install tooling needed by the test harness
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc curl iproute2 kmod can-utils

      # ------------------------------------------------------------------
      # 3. Set up a virtual CAN interface named "can0"
      #
      #    Pi-A.c opens a SocketCAN socket and calls
      #        ioctl(fd, SIOCGIFINDEX, &ifr)   with ifr.ifr_name = "can0"
      #
      #    On a GitHub-hosted runner there is no real CAN hardware, so
      #    that ioctl fails with "No such device" and Pi-A exits *before*
      #    it ever opens its TCP listener.  Pi-B then can't reach it and
      #    every socket test fails.  Creating a vcan device named can0
      #    satisfies the ioctl and lets Pi-A continue normally.
      # ------------------------------------------------------------------
      - name: Create virtual CAN interface (can0)
        run: |
          set -e
          sudo modprobe vcan || true
          if ! ip link show can0 >/dev/null 2>&1; then
            sudo ip link add dev can0 type vcan
          fi
          sudo ip link set up can0
          ip -details link show can0

      # ------------------------------------------------------------------
      # 4. Download the pre-built binaries produced by the compile workflow
      # ------------------------------------------------------------------
      - name: Download Pi-A / Pi-B binaries
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: compile-socket.yml
          workflow_conclusion: success
          name: socket-binaries
          path: PI/Socket/build
          if_no_artifact_found: warn

      - name: Make binaries executable
        run: |
          set -e
          ls -la PI/Socket/build || true
          chmod +x PI/Socket/build/RPi_A PI/Socket/build/RPi_B 2>/dev/null || true

      # ------------------------------------------------------------------
      # 5. Run the end-to-end test script
      # ------------------------------------------------------------------
      - name: Run socket tests
        env:
          PI_A_BINARY: ${{ github.workspace }}/PI/Socket/build/RPi_A
          PI_B_BINARY: ${{ github.workspace }}/PI/Socket/build/RPi_B
        run: |
          bash Code-Tests/Socket/test_socket.sh

      # ------------------------------------------------------------------
      # 6. Upload logs on failure for post-mortem
      # ------------------------------------------------------------------
      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: socket-test-logs
          path: |
            /tmp/pi1_out.txt
            /tmp/pi2_out.txt
          if-no-files-found: ignore
