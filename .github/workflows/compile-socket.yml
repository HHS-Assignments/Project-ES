# Compile Socket Binaries
#
# Compiles Pi-B.c and Pi-A.c for both linux-x86_64 (native) and
# linux-aarch64 (Raspberry Pi) and uploads the binaries as workflow
# artifacts so the test workflow can download and run them without
# recompiling.
#
# Triggered when any C source or header in the Socket folder changes.
# Can also be triggered manually from the Actions tab.

name: Compiling Socket Binaries

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'PI/Socket/**'
      - 'Code-Tests/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'PI/Socket/**'
      - 'Code-Tests/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  compile:
    name: Compiling Socket Binaries
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Install Git (for faster checkout)
        run: |
          apt-get update -qq
          apt-get install -y -qq git

      - name: Checkout code
        uses: actions/checkout@v4.1.7

      - name: Install build tools
        run: |
          apt-get install -y -qq build-essential cmake gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Compile for linux-x86_64
        run: |
          cd PI/Socket
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release -- -j$(nproc)

      - name: Compile for linux-aarch64 (Raspberry Pi)
        run: |
          cd PI/Socket
          mkdir -p build-aarch64
          cd build-aarch64
          CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release -- -j$(nproc)

      - name: Upload linux-x86_64 artifacts
        uses: actions/upload-artifact@v4.3.6
        with:
          name: socket-binaries-linux-x86_64
          path: |
            PI/Socket/build/RPi_B
            PI/Socket/build/RPi_A
          if-no-files-found: error

      - name: Upload linux-aarch64 artifacts
        uses: actions/upload-artifact@v4.3.6
        with:
          name: socket-binaries-linux-aarch64
          path: |
            PI/Socket/build-aarch64/RPi_B
            PI/Socket/build-aarch64/RPi_A
          if-no-files-found: error