name: Testing Socket Binaries

# Triggered automatically after the "Compile Socket Binaries" workflow
# finishes successfully, or manually from the Actions tab.
on:
  workflow_run:
    workflows: ["Compile Socket Binaries"]
    types:
      - completed
  workflow_dispatch:

jobs:
  test:
    # Only run when the upstream compile workflow succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repo (we need the test script + sources)
      # ------------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Install basic tooling needed by the test harness
      # ------------------------------------------------------------------
      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc curl iproute2 kmod can-utils

      # ------------------------------------------------------------------
      # 3. Install the kernel "extras" package that contains vcan.ko
      #
      #    The Azure-flavoured kernel used by GitHub-hosted runners
      #    (linux-image-<ver>-azure) ships a *minimal* module set.
      #    vcan / can_raw live in linux-modules-extra-<ver>-azure and
      #    must be installed explicitly, otherwise:
      #        modprobe: FATAL: Module vcan not found in directory
      #        /lib/modules/<ver>-azure
      #
      #    We try the exact running kernel first, then fall back to the
      #    generic meta-package.  The whole step is allowed to fail so
      #    that a broken APT mirror never blocks the workflow — the next
      #    step will report what really happened.
      # ------------------------------------------------------------------
      - name: Install vcan kernel module (linux-modules-extra)
        continue-on-error: true
        run: |
          set -x
          KREL="$(uname -r)"
          echo "Running kernel: $KREL"
          sudo apt-get install -y --no-install-recommends \
            "linux-modules-extra-${KREL}" \
            || sudo apt-get install -y --no-install-recommends \
                 linux-modules-extra-azure \
            || sudo apt-get install -y --no-install-recommends \
                 linux-modules-extra-$(uname -r | sed 's/-azure$//')-generic \
            || true
          ls /lib/modules/"${KREL}"/kernel/drivers/net/can/ 2>/dev/null || true
          ls /lib/modules/"${KREL}"/kernel/net/can/ 2>/dev/null || true

      # ------------------------------------------------------------------
      # 4. Set up a virtual CAN interface named "can0".
      #
      #    Pi-A.c opens a SocketCAN socket and calls
      #        ioctl(fd, SIOCGIFINDEX, &ifr)   with ifr.ifr_name = "can0"
      #    On a hosted runner there is no real CAN hardware, so without
      #    a vcan interface that ioctl fails with "No such device" and
      #    Pi-A exits *before* it opens its TCP listener.  Pi-B then
      #    can't reach it and every socket test fails.
      #
      #    The step is allowed to fail (continue-on-error) so we always
      #    reach the test runner and see Pi-A's real output in the logs.
      # ------------------------------------------------------------------
      - name: Create virtual CAN interface (can0)
        continue-on-error: true
        run: |
          set -x
          sudo modprobe vcan || {
            echo "::warning::vcan module unavailable on this runner kernel ($(uname -r)). Pi-A may fail SIOCGIFINDEX."
            exit 0
          }
          sudo modprobe can_raw || true
          if ! ip link show can0 >/dev/null 2>&1; then
            sudo ip link add dev can0 type vcan || {
              echo "::warning::could not create vcan can0"
              exit 0
            }
          fi
          sudo ip link set up can0 || true
          ip -details link show can0 || true

      # ------------------------------------------------------------------
      # 5. Download the pre-built binaries from the compile workflow
      # ------------------------------------------------------------------
      - name: Download Pi-A / Pi-B binaries
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: compile-socket.yml
          workflow_conclusion: success
          name: socket-binaries
          path: PI/Socket/build
          if_no_artifact_found: warn

      - name: Make binaries executable
        run: |
          set -e
          ls -la PI/Socket/build || true
          chmod +x PI/Socket/build/RPi_A PI/Socket/build/RPi_B 2>/dev/null || true

      # ------------------------------------------------------------------
      # 6. Run the end-to-end test script
      # ------------------------------------------------------------------
      - name: Run socket tests
        env:
          PI_A_BINARY: ${{ github.workspace }}/PI/Socket/build/RPi_A
          PI_B_BINARY: ${{ github.workspace }}/PI/Socket/build/RPi_B
        run: |
          bash Code-Tests/Socket/test_socket.sh

      # ------------------------------------------------------------------
      # 7. Upload logs on failure for post-mortem
      # ------------------------------------------------------------------
      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: socket-test-logs
          path: |
            /tmp/pi1_out.txt
            /tmp/pi2_out.txt
          if-no-files-found: ignore
