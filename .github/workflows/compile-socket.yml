# Compile Socket Binaries
#
# Compiles pi_a.cpp and pi_b.cpp for both linux-x86_64 (native) and
# linux-aarch64 (Raspberry Pi) and uploads the binaries as workflow
# artifacts so the test workflow can download and run them without
# recompiling.
#
# Also publishes the raw binaries to a GitHub Release ("latest-build")
# so they can be downloaded directly without unzipping.
#
# Triggered when any C/C++ source or header in PI/Socket changes.
# Can also be triggered manually from the Actions tab.

name: Compiling Socket Binaries

on:
  push:
    #branches: [main, dev]
    paths:
      - 'PI/Socket/**'
      - 'Code-Tests/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'PI/Socket/**'
      - 'Code-Tests/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a Release

jobs:
  compile:
    name: Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            cxx: g++
            apt_pkgs: build-essential
          - target: linux-aarch64
            cxx: aarch64-linux-gnu-g++
            apt_pkgs: build-essential g++-aarch64-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.apt_pkgs }}

      - name: Compile pi_a and pi_b
        working-directory: PI/Socket
        run: |
          mkdir -p build/${{ matrix.target }}
          OUT=build/${{ matrix.target }}
          CXX="${{ matrix.cxx }}"
          CXXFLAGS="-O2 -std=c++17 -pthread -Wall -Wextra"

          echo "Compiling pi_a.cpp -> $OUT/RPi_A"
          $CXX $CXXFLAGS pi_a.cpp -o "$OUT/RPi_A"

          echo "Compiling pi_b.cpp -> $OUT/RPi_B"
          $CXX $CXXFLAGS pi_b.cpp -o "$OUT/RPi_B"

          file "$OUT/RPi_A" "$OUT/RPi_B"

      - name: Rename binaries for release (include target)
        working-directory: PI/Socket/build/${{ matrix.target }}
        run: |
          cp RPi_A "RPi_A-${{ matrix.target }}"
          cp RPi_B "RPi_B-${{ matrix.target }}"

      # Zipped artifact (used by the test workflow)
      - name: Upload ${{ matrix.target }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: socket-binaries-${{ matrix.target }}
          path: |
            PI/Socket/build/${{ matrix.target }}/RPi_A
            PI/Socket/build/${{ matrix.target }}/RPi_B
          if-no-files-found: error

      # Raw binaries published as Release assets (no zip wrapping)
      - name: Publish raw binaries to "latest-build" Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: Latest Build
          body: |
            Automated build of pi_a / pi_b socket binaries.
            Commit: ${{ github.sha }}
          files: |
            PI/Socket/build/${{ matrix.target }}/RPi_A-${{ matrix.target }}
            PI/Socket/build/${{ matrix.target }}/RPi_B-${{ matrix.target }}
          fail_on_unmatched_files: true
