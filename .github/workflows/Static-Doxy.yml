# Name of the workflow as it will appear in GitHub Actions tab
name: Generate Documentation

# Define when this workflow will run
on:
  push:
    branches:
      - main      # Run when code is pushed to main branch
      - dev      # Run when code is pushed to dev branch
    paths:
      - '.github/workflows/**'
      - 'Doxyfile'
      - '**.c'
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.ino'
  pull_request:
    types:
      - closed    # This will trigger when a PR is closed
    branches:
      - main      # Only for PRs targeting main branch
      - dev      # Only for PRs targeting dev branch
  workflow_dispatch:  # Allows manual triggering from Actions tab
    # To run manually:
    # 1. Go to GitHub Actions tab in your repository
    # 2. Click "Generate Documentation" workflow in the left sidebar
    # 3. Click the "Run workflow" button above the workflow runs list
    # 4. Select the branch you want to run on
    # 5. Click "Run workflow"
    #
    # Note: The "Run workflow" button only appears for workflows
    # that use the workflow_dispatch event trigger.
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    # Only run this job when a PR is merged (not just closed) or on direct pushes
    if: github.event.pull_request.merged == true || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4.1.7  # GitHub-provided action to clone the repository
        with:
          fetch-depth: 0  # Get full history, including tags for versioning

      # Step 2: Install dependencies (build-essential includes gcc)
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential gcc-aarch64-linux-gnu doxygen graphviz

      # Step 3: Compile socket programs for linux-x86_64 and linux-aarch64
      - name: Compile socket programs for both architectures
        run: |
          cd Socket
          gcc -O2 -o Pi-1s-linux-x86_64 Pi-1s.c cJSON.c -lm
          gcc -O2 -o Pi-2s-linux-x86_64 Pi-2s.c cJSON.c -lm
          gcc -O2 -o Pi-2c-linux-x86_64 Pi-2c.c cJSON.c -lm
          aarch64-linux-gnu-gcc -O2 -o Pi-1s-linux-aarch64 Pi-1s.c cJSON.c -lm
          aarch64-linux-gnu-gcc -O2 -o Pi-2s-linux-aarch64 Pi-2s.c cJSON.c -lm
          aarch64-linux-gnu-gcc -O2 -o Pi-2c-linux-aarch64 Pi-2c.c cJSON.c -lm
          cd ..


      # Step 3b: Run end-to-end socket tests (x86_64 only)
      - name: Run socket end-to-end tests
        run: |
          apt-get install -y curl
          bash Socket/tests/test_socket.sh

      # Step 4a: Upload linux-x86_64 socket binaries as one artifact
      - name: Upload linux-x86_64 socket artifact
        uses: actions/upload-artifact@v4.3.6
        with:
          name: socket-binaries-linux-x86_64
          path: |
            Socket/Pi-1s-linux-x86_64
            Socket/Pi-2s-linux-x86_64
            Socket/Pi-2c-linux-x86_64
          if-no-files-found: error

      # Step 4b: Upload linux-aarch64 socket binaries as one artifact
      - name: Upload linux-aarch64 socket artifact
        uses: actions/upload-artifact@v4.3.6
        with:
          name: socket-binaries-linux-aarch64
          path: |
            Socket/Pi-1s-linux-aarch64
            Socket/Pi-2s-linux-aarch64
            Socket/Pi-2c-linux-aarch64
          if-no-files-found: error

      # Step 5: Generate documentation with Doxygen
      - name: Generate docs
        uses: mattnotmitt/doxygen-action@v1.9.5
        with:
          doxyfile-path: './Doxyfile'

      # Step 6: Upload documentation as artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: ./Doxygen

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
      
      # Output the URL
      - name: Documentation URL
        run: |
          echo "✅ Documentation deployed successfully!"
          echo "📄 View your documentation at: ${{ steps.deployment.outputs.page_url }}"
          echo "## 📚 Documentation Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Documentation has been successfully generated and deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **View Documentation:** [${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY